<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マイ・jscanify・スキャナー</title>
    <script src="https://cdn.jsdelivr.net/npm/@techstark/opencv-js@4.9.0-release.1/dist/opencv.js" async onerror="window.__opencvLoadFailed = true"></script>
    <script src="https://cdn.jsdelivr.net/gh/ColonelParrot/jscanify@master/src/jscanify.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f2f5; padding: 20px; }
        video, canvas { max-width: 100%; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); background: #000; }
        button { padding: 12px 24px; font-size: 16px; border: none; background: #007bff; color: white; border-radius: 20px; cursor: pointer; margin: 15px 0; font-weight: bold; }
        button:disabled { background: #ccc; }
        .box { margin-bottom: 25px; }
        h3 { color: #333; margin-bottom: 5px; }
        .video-wrap { position: relative; display: inline-block; max-width: 100%; overflow: hidden; border-radius: 8px; }
        .guide-frame {
            position: absolute;
            left: 20%; top: 5%; width: 60%; height: 90%;
            border: 3px dashed rgba(255, 255, 255, 0.85);
            border-radius: 8px;
            box-shadow: 0 0 0 999px rgba(0, 0, 0, 0.25);
            pointer-events: none;
            transition: border-color 0.2s;
        }
        .guide-frame.aligned { border-color: #2ecc71; box-shadow: 0 0 0 999px rgba(46, 204, 113, 0.15); }
        #guideText { color: #333; font-weight: bold; min-height: 1.2em; }
        #overlayCanvas { position: absolute; left: 0; top: 0; width: 100%; height: 100%; pointer-events: none; background: transparent; box-shadow: none; }
        #manualCanvas { touch-action: none; cursor: crosshair; }
        #manualBox { display: none; }
        #manualHint { color: #666; font-size: 14px; }
    </style>
</head>
<body>

    <h2>📄 jscanify 撮影テストアプリ</h2>
    <p id="status">⏳ ライブラリを読み込み中...</p>

    <div class="box">
        <h3>1. カメラ映像（プリントを写してね）</h3>
        <p id="guideText">📐 この枠内にプリントを合わせてください</p>
        <div class="video-wrap">
            <video id="video" width="400" height="300" autoplay playsinline muted></video>
            <div id="guideFrame" class="guide-frame"></div>
            <canvas id="overlayCanvas" width="400" height="300"></canvas>
        </div>
    </div>

    <button id="snapBtn" disabled>📸 この位置で写真を撮る！</button>

    <div class="box" id="manualBox">
        <h3>2. うまく切り抜けなかった場合は角をドラッグして調整してね</h3>
        <p id="manualHint">📍 四隅の点を書類の角に合わせてください</p>
        <canvas id="manualCanvas"></canvas>
        <br>
        <button id="applyManualBtn">✂️ この位置で切り抜く</button>
    </div>

    <div class="box">
        <h3>3. 補正後の写真（トリミング・台形補正済）</h3>
        <div id="resultContainer"></div>
    </div>

    <script>
        const video = document.getElementById('video');
        const snapBtn = document.getElementById('snapBtn');
        const status = document.getElementById('status');
        const resultContainer = document.getElementById('resultContainer');
        const guideFrame = document.getElementById('guideFrame');
        const guideText = document.getElementById('guideText');
        const overlayCanvas = document.getElementById('overlayCanvas');
        const overlayCtx = overlayCanvas.getContext('2d');
        const manualBox = document.getElementById('manualBox');
        const manualCanvas = document.getElementById('manualCanvas');
        const manualCtx = manualCanvas.getContext('2d');
        const applyManualBtn = document.getElementById('applyManualBtn');
        let scanner;

        // 手動トリミング調整用の状態
        const HANDLE_RADIUS = 14;
        let rawCaptureCanvas = null; // 撮影時のフル解像度canvas
        let manualScale = 1;         // manualCanvas表示サイズ ÷ rawCaptureCanvasサイズ
        let manualPoints = null;     // manualCanvas表示座標系での四隅 {tl,tr,bl,br}
        let draggingCorner = null;

        // 自動撮影の判定用パラメータ
        const DETECT_WIDTH = 640;      // 検出処理用に縮小する幅(px)
        const POLL_INTERVAL_MS = 250;  // 検出ポーリング間隔
        const REQUIRED_STABLE_MS = 500; // これだけ静止し続けたら自動撮影
        const MOVE_THRESHOLD_PX = 8;   // 「静止」とみなす1フレームあたりの平均移動量
        const GUIDE_MARGIN_PX = 10;    // 枠判定の許容マージン
        const AUTO_CAPTURE_COOLDOWN_MS = 3000; // 自動撮影後、再開までの待ち時間

        const detectCanvas = document.createElement('canvas');
        let pollTimer = null;
        let stableSince = null;
        let lastCorners = null;
        let autoCaptureCooldown = false;

        // opencv.jsはasync読み込みなので、グローバル変数cvが定義されるまで待ってから
        // onRuntimeInitializedコールバックを登録する
        const openCvWaitStartedAt = Date.now();
        function waitForOpenCv() {
            if (window.__opencvLoadFailed) {
                status.innerText = "❌ opencv.jsの読み込みに失敗しました（通信環境を確認して再読み込みしてください）";
                return;
            }
            if (typeof cv === 'undefined') {
                if (Date.now() - openCvWaitStartedAt > 20000) {
                    status.innerText = "❌ opencv.jsの読み込みがタイムアウトしました（回線が遅いか、ブロックされています。再読み込みしてください）";
                    return;
                }
                setTimeout(waitForOpenCv, 100);
                return;
            }
            cv['onRuntimeInitialized'] = () => {
                scanner = new jscanify();
                status.innerText = "✅ 準備完了！教科書やプリントに向けてボタンを押してね";
                snapBtn.disabled = false;
                startCamera();
            };
        }
        waitForOpenCv();

        // カメラを起動する
        function startCamera() {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
                .then((stream) => {
                    video.srcObject = stream;
                    video.addEventListener('loadedmetadata', () => {
                        // ビデオの表示サイズが確定したら、重ねるcanvasのサイズもぴったり合わせる
                        overlayCanvas.width = video.clientWidth;
                        overlayCanvas.height = video.clientHeight;
                        startDetectionLoop();
                    }, { once: true });
                    // 環境によってはautoplay属性だけでは再生が始まらないため明示的に再生する
                    video.play().catch((err) => {
                        status.innerText = "❌ カメラ映像の再生に失敗しました: " + err;
                    });
                })
                .catch((err) => {
                    status.innerText = "❌ カメラの起動に失敗しました: " + err;
                });
        }

        // 写真を撮ってjscanifyで加工する（手動ボタン・自動撮影の共通処理）
        function capturePhoto({ auto } = { auto: false }) {
            // 表示されている古い結果を消す
            resultContainer.innerHTML = '';

            if (video.readyState < 2) {
                status.innerText = "⏳ カメラ映像がまだ準備できていません。少し待ってから押してね";
                return;
            }

            status.innerText = "⚡ 補正処理中...";

            // 現在のビデオフレームを一旦canvasに描画してからjscanifyに渡す
            const captureCanvas = document.createElement('canvas');
            captureCanvas.width = video.videoWidth;
            captureCanvas.height = video.videoHeight;
            captureCanvas.getContext('2d').drawImage(video, 0, 0);
            rawCaptureCanvas = captureCanvas;

            // コーナー座標を自分で取得しておく（手動調整UIの初期位置に使うため）
            let detectedCorners = null;
            let mat = null, contour = null;
            try {
                mat = cv.imread(captureCanvas);
                contour = scanner.findPaperContour(mat);
                if (contour) detectedCorners = scanner.getCornerPoints(contour);
            } catch (e) {
                // 検出に失敗しても手動調整で対応できるので無視する
            } finally {
                if (contour) contour.delete();
                if (mat) mat.delete();
            }

            // 手動調整UIを、検出できていればその位置、できていなければ標準的な内側の矩形で表示する
            showManualAdjust(captureCanvas, detectedCorners);

            if (!detectedCorners) {
                status.innerText = "❌ 紙を検出できませんでした。下の枠を手動で調整して「この位置で切り抜く」を押してね";
                return;
            }

            // 💡 ここが心臓部！撮影したフレームから書類を切り出し、横600×縦800に真っ直ぐ補正する
            const resultCanvas = scanner.extractPaper(captureCanvas, 600, 800, detectedCorners);

            if (!resultCanvas) {
                status.innerText = "❌ 紙を検出できませんでした。下の枠を手動で調整して「この位置で切り抜く」を押してね";
                return;
            }

            // 画面にできあがった画像を追加する
            resultContainer.appendChild(resultCanvas);
            status.innerText = (auto ? "✅ 自動撮影しました！" : "✅ 綺麗に補正されました！") + " うまく切り抜けていなければ下で手動調整できます";
        }

        // ボタンが押されたら手動で撮影する
        snapBtn.addEventListener('click', () => capturePhoto({ auto: false }));

        // 手動トリミング調整UIを表示する。cornersがnullなら標準的な内側矩形を初期値にする
        function showManualAdjust(rawCanvas, corners) {
            const displayWidth = Math.min(400, rawCanvas.width);
            const scale = displayWidth / rawCanvas.width;
            manualCanvas.width = displayWidth;
            manualCanvas.height = Math.round(rawCanvas.height * scale);
            manualScale = scale;

            const base = corners || {
                topLeftCorner: { x: rawCanvas.width * 0.1, y: rawCanvas.height * 0.1 },
                topRightCorner: { x: rawCanvas.width * 0.9, y: rawCanvas.height * 0.1 },
                bottomLeftCorner: { x: rawCanvas.width * 0.1, y: rawCanvas.height * 0.9 },
                bottomRightCorner: { x: rawCanvas.width * 0.9, y: rawCanvas.height * 0.9 },
            };
            manualPoints = {
                tl: { x: base.topLeftCorner.x * scale, y: base.topLeftCorner.y * scale },
                tr: { x: base.topRightCorner.x * scale, y: base.topRightCorner.y * scale },
                bl: { x: base.bottomLeftCorner.x * scale, y: base.bottomLeftCorner.y * scale },
                br: { x: base.bottomRightCorner.x * scale, y: base.bottomRightCorner.y * scale },
            };

            manualBox.style.display = 'block';
            drawManual();
        }

        // 手動調整canvasに撮影画像＋ドラッグ可能な四隅を描画する
        function drawManual() {
            manualCtx.clearRect(0, 0, manualCanvas.width, manualCanvas.height);
            manualCtx.drawImage(rawCaptureCanvas, 0, 0, manualCanvas.width, manualCanvas.height);

            const pts = [manualPoints.tl, manualPoints.tr, manualPoints.br, manualPoints.bl];
            manualCtx.strokeStyle = '#007bff';
            manualCtx.lineWidth = 3;
            manualCtx.beginPath();
            pts.forEach((p, i) => (i === 0 ? manualCtx.moveTo(p.x, p.y) : manualCtx.lineTo(p.x, p.y)));
            manualCtx.closePath();
            manualCtx.stroke();

            manualCtx.fillStyle = '#007bff';
            pts.forEach((p) => {
                manualCtx.beginPath();
                manualCtx.arc(p.x, p.y, HANDLE_RADIUS, 0, Math.PI * 2);
                manualCtx.fill();
            });
        }

        // manualCanvas上のポインタ座標を、canvasの描画座標系(width/height基準)に変換する
        function getManualPoint(evt) {
            const rect = manualCanvas.getBoundingClientRect();
            const scaleX = manualCanvas.width / rect.width;
            const scaleY = manualCanvas.height / rect.height;
            return {
                x: (evt.clientX - rect.left) * scaleX,
                y: (evt.clientY - rect.top) * scaleY,
            };
        }

        manualCanvas.addEventListener('pointerdown', (evt) => {
            if (!manualPoints) return;
            const p = getManualPoint(evt);
            let closestKey = null;
            let closestDist = Infinity;
            for (const key of ['tl', 'tr', 'bl', 'br']) {
                const d = Math.hypot(p.x - manualPoints[key].x, p.y - manualPoints[key].y);
                if (d < closestDist) {
                    closestDist = d;
                    closestKey = key;
                }
            }
            if (closestDist <= HANDLE_RADIUS * 2.5) {
                draggingCorner = closestKey;
                manualCanvas.setPointerCapture(evt.pointerId);
            }
        });

        manualCanvas.addEventListener('pointermove', (evt) => {
            if (!draggingCorner) return;
            const p = getManualPoint(evt);
            manualPoints[draggingCorner] = {
                x: Math.max(0, Math.min(manualCanvas.width, p.x)),
                y: Math.max(0, Math.min(manualCanvas.height, p.y)),
            };
            drawManual();
        });

        function endManualDrag() {
            draggingCorner = null;
        }
        manualCanvas.addEventListener('pointerup', endManualDrag);
        manualCanvas.addEventListener('pointercancel', endManualDrag);

        // 手動で調整した四隅を使って切り抜きをやり直す
        applyManualBtn.addEventListener('click', () => {
            if (!rawCaptureCanvas || !manualPoints) return;

            const s = manualScale;
            const cornerPoints = {
                topLeftCorner: { x: manualPoints.tl.x / s, y: manualPoints.tl.y / s },
                topRightCorner: { x: manualPoints.tr.x / s, y: manualPoints.tr.y / s },
                bottomLeftCorner: { x: manualPoints.bl.x / s, y: manualPoints.bl.y / s },
                bottomRightCorner: { x: manualPoints.br.x / s, y: manualPoints.br.y / s },
            };

            const resultCanvas = scanner.extractPaper(rawCaptureCanvas, 600, 800, cornerPoints);
            resultContainer.innerHTML = '';
            if (!resultCanvas) {
                status.innerText = "❌ 切り抜きに失敗しました。角の位置を調整してもう一度試してね";
                return;
            }
            resultContainer.appendChild(resultCanvas);
            status.innerText = "✅ 手動トリミングを適用しました！";
        });

        // ガイド枠のピクセル座標（video要素の表示サイズに対する割合から算出）
        function getGuideRectPx() {
            return {
                x: video.clientWidth * 0.10,
                y: video.clientHeight * 0.15,
                w: video.clientWidth * 0.80,
                h: video.clientHeight * 0.70,
            };
        }

        function resetStability() {
            stableSince = null;
            lastCorners = null;
        }

        function setGuideMessage(text, aligned) {
            guideText.innerText = text;
            guideFrame.classList.toggle('aligned', aligned);
        }

        // 検出した書類の角を線でつないでオーバーレイ表示する
        function drawCorners(scaled, aligned) {
            overlayCanvas.width = video.clientWidth;
            overlayCanvas.height = video.clientHeight;
            overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);

            const pts = [scaled.tl, scaled.tr, scaled.br, scaled.bl];
            overlayCtx.strokeStyle = aligned ? '#2ecc71' : '#ff5252';
            overlayCtx.lineWidth = 3;
            overlayCtx.beginPath();
            pts.forEach((p, i) => (i === 0 ? overlayCtx.moveTo(p.x, p.y) : overlayCtx.lineTo(p.x, p.y)));
            overlayCtx.closePath();
            overlayCtx.stroke();

            overlayCtx.fillStyle = aligned ? '#2ecc71' : '#ff5252';
            pts.forEach((p) => {
                overlayCtx.beginPath();
                overlayCtx.arc(p.x, p.y, 6, 0, Math.PI * 2);
                overlayCtx.fill();
            });
        }

        function clearCorners() {
            overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
        }

        // 検出ループを開始する（ビデオのメタデータ読み込み後に一度だけ呼ばれる）
        function startDetectionLoop() {
            if (pollTimer) return;
            pollTimer = setInterval(pollFrame, POLL_INTERVAL_MS);
        }

        // 1フレーム分の紙検出＆アライメント判定を行う
        function pollFrame() {
            if (autoCaptureCooldown || !scanner || video.readyState < 2) return;

            const vw = video.videoWidth, vh = video.videoHeight;
            const cw = video.clientWidth, ch = video.clientHeight;
            if (!vw || !vh || !cw || !ch) return;

            // 検出用canvasは「画面に表示されている縦横比」に合わせる。
            // videoは既定でobject-fit:fillのため、表示時に元映像の縦横比と非等方に伸縮されている。
            // 検出用canvasも同じ比率で描画しないと、検出した座標を表示サイズへスケールする際にズレる。
            const dw = DETECT_WIDTH, dh = Math.round(DETECT_WIDTH * (ch / cw));
            detectCanvas.width = dw;
            detectCanvas.height = dh;
            detectCanvas.getContext('2d').drawImage(video, 0, 0, dw, dh);

            let mat = null;
            let contour = null;
            try {
                mat = cv.imread(detectCanvas);
                contour = scanner.findPaperContour(mat);

                if (!contour) {
                    resetStability();
                    clearCorners();
                    setGuideMessage("📐 プリントを枠内に合わせてください", false);
                    return;
                }

                const corners = scanner.getCornerPoints(contour);

                // 検出用に縮小した座標を、実際のvideo表示サイズに合わせてスケールアップ
                const sx = video.clientWidth / dw;
                const sy = video.clientHeight / dh;
                const scaled = {
                    tl: { x: corners.topLeftCorner.x * sx, y: corners.topLeftCorner.y * sy },
                    tr: { x: corners.topRightCorner.x * sx, y: corners.topRightCorner.y * sy },
                    bl: { x: corners.bottomLeftCorner.x * sx, y: corners.bottomLeftCorner.y * sy },
                    br: { x: corners.bottomRightCorner.x * sx, y: corners.bottomRightCorner.y * sy },
                };

                const rect = getGuideRectPx();
                const points = [scaled.tl, scaled.tr, scaled.bl, scaled.br];
                const withinGuide = points.every((p) =>
                    p.x >= rect.x - GUIDE_MARGIN_PX && p.x <= rect.x + rect.w + GUIDE_MARGIN_PX &&
                    p.y >= rect.y - GUIDE_MARGIN_PX && p.y <= rect.y + rect.h + GUIDE_MARGIN_PX
                );

                drawCorners(scaled, withinGuide);

                if (!withinGuide) {
                    resetStability();
                    setGuideMessage("📐 プリントを枠内に合わせてください", false);
                    return;
                }

                // フレーム間の移動量を見て「静止」しているか判定する
                let avgMove = Infinity;
                if (lastCorners) {
                    avgMove = (
                        Math.hypot(scaled.tl.x - lastCorners.tl.x, scaled.tl.y - lastCorners.tl.y) +
                        Math.hypot(scaled.tr.x - lastCorners.tr.x, scaled.tr.y - lastCorners.tr.y) +
                        Math.hypot(scaled.bl.x - lastCorners.bl.x, scaled.bl.y - lastCorners.bl.y) +
                        Math.hypot(scaled.br.x - lastCorners.br.x, scaled.br.y - lastCorners.br.y)
                    ) / 4;
                }
                lastCorners = scaled;

                if (avgMove > MOVE_THRESHOLD_PX) {
                    stableSince = Date.now();
                    setGuideMessage("✅ 枠内OK！そのまま動かさないでください…", true);
                    return;
                }

                if (!stableSince) stableSince = Date.now();
                const stableMs = Date.now() - stableSince;
                setGuideMessage(`✅ 静止中… (${(stableMs / 1000).toFixed(1)}s / ${(REQUIRED_STABLE_MS / 1000).toFixed(1)}s)`, true);

                if (stableMs >= REQUIRED_STABLE_MS) {
                    triggerAutoCapture();
                }
            } catch (e) {
                // 検出処理中の一時的なエラーは無視して次のフレームで再試行する
            } finally {
                if (contour) contour.delete();
                if (mat) mat.delete();
            }
        }

        function triggerAutoCapture() {
            autoCaptureCooldown = true;
            resetStability();
            setGuideMessage("📸 自動撮影中...", true);
            capturePhoto({ auto: true });
            setTimeout(() => {
                autoCaptureCooldown = false;
                setGuideMessage("📐 この枠内にプリントを合わせてください", false);
            }, AUTO_CAPTURE_COOLDOWN_MS);
        }
    </script>
</body>
</html>
